name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: ${{ vars.NODE_VERSION != '' && vars.NODE_VERSION || '20' }}
  PHP_VERSION: ${{ vars.PHP_VERSION != '' && vars.PHP_VERSION || '8.3' }}
  EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL != '' && vars.EXPO_PUBLIC_API_URL || 'http://localhost/api/v1' }}

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, mbstring, pdo_sqlite, sqlite3, xml
          coverage: none
          tools: composer:v2

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run backend test suite
        working-directory: backend
        run: php artisan test

  frontend-web:
    name: Frontend Web Export
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Export frontend web build
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: ${{ env.EXPO_PUBLIC_API_URL }}
        run: npm run web

  docker-smoke:
    name: Docker Smoke Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - backend-test
      - frontend-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: carneshop-web:ci
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            PHP_VERSION=${{ env.PHP_VERSION }}
            EXPO_PUBLIC_API_URL=${{ env.EXPO_PUBLIC_API_URL }}
          cache-from: type=gha

      - name: Validate image contents
        run: |
          docker run --rm --entrypoint sh carneshop-web:ci -c "test -f /var/www/html/backend/public/index.html && test -f /var/www/html/backend/public/index.php && test -f /var/www/html/backend/public/.htaccess"
